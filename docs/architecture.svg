<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d18616;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0883e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Episodic Memory Architecture</text>

  <!-- Left: Session End -->
  <rect x="20" y="50" width="370" height="165" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="205" y="72" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">SESSION END</text>

  <!-- Conversations box -->
  <rect x="40" y="88" width="100" height="40" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="90" y="112" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Conversations</text>

  <!-- Arrow 1: Conv -> Parser -->
  <line x1="140" y1="108" x2="163" y2="108" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Parser box -->
  <rect x="165" y="88" width="80" height="40" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="205" y="105" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="10">Parse</text>
  <text x="205" y="118" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">JSONL</text>

  <!-- Arrow 2: Parser -> Embeddings -->
  <line x1="245" y1="108" x2="268" y2="108" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- Embeddings box -->
  <rect x="270" y="88" width="100" height="40" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="320" y="105" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="10">Embeddings</text>
  <text x="320" y="118" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">384-dim vectors</text>

  <!-- Arrow down from Conversations to Haiku -->
  <line x1="90" y1="128" x2="90" y2="148" stroke="#d2a8ff" stroke-width="1.5"/>

  <!-- Haiku LLM box -->
  <rect x="40" y="150" width="100" height="40" rx="6" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="90" y="167" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Haiku LLM</text>
  <text x="90" y="180" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="9">Extract Facts</text>

  <!-- Arrow: Haiku -> Facts DB -->
  <line x1="140" y1="170" x2="268" y2="170" stroke="#d2a8ff" stroke-width="1.5"/>

  <!-- Facts DB box -->
  <rect x="270" y="150" width="100" height="40" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="320" y="167" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="10">Facts Table</text>
  <text x="320" y="180" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">+ embeddings</text>

  <!-- Center: SQLite -->
  <rect x="310" y="235" width="180" height="55" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="400" y="256" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SQLite + sqlite-vec</text>
  <text x="400" y="272" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10">exchanges | facts | vectors</text>

  <!-- Arrow: Embeddings -> SQLite -->
  <path d="M 320 128 L 320 215 Q 320 225 330 230 L 370 235" fill="none" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Arrow: Facts -> SQLite -->
  <path d="M 320 190 L 320 215 Q 320 225 330 230 L 370 235" fill="none" stroke="#d2a8ff" stroke-width="1.5"/>

  <!-- Right: Session Start -->
  <rect x="410" y="50" width="370" height="165" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="595" y="72" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">SESSION START</text>

  <!-- Vector Search box -->
  <rect x="430" y="88" width="100" height="40" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="10">Vector Search</text>
  <text x="480" y="118" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">similarity 0.85</text>

  <!-- Arrow: Search -> Haiku -->
  <line x1="530" y1="108" x2="553" y2="108" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Haiku Consolidation box -->
  <rect x="555" y="88" width="100" height="40" rx="6" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="605" y="105" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Haiku LLM</text>
  <text x="605" y="118" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="9">Consolidate</text>

  <!-- Arrow: Haiku -> Actions -->
  <line x1="655" y1="108" x2="668" y2="108" stroke="#d2a8ff" stroke-width="1.5"/>

  <!-- Actions box -->
  <rect x="670" y="85" width="90" height="46" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="715" y="101" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9">DUPLICATE merge</text>
  <text x="715" y="113" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9">CONTRADICT replace</text>
  <text x="715" y="125" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9">EVOLVE update</text>

  <!-- Arrow: SQLite -> Vector Search -->
  <path d="M 430 255 Q 420 255 420 240 L 420 128 Q 420 108 430 108 L 428 108" fill="none" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Context Injection box -->
  <rect x="430" y="150" width="230" height="40" rx="6" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="545" y="167" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Context Injection</text>
  <text x="545" y="180" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10">Top 10 facts by confirmation count</text>

  <!-- Arrow: Actions -> merged facts (back to SQLite) -->
  <path d="M 715 131 L 715 200 Q 715 210 705 215 L 500 235" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- MCP Tools section -->
  <rect x="20" y="310" width="760" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="332" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">MCP Tools</text>

  <!-- Tool badges -->
  <rect x="120" y="345" width="120" height="26" rx="13" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="180" y="362" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="11">search</text>

  <rect x="280" y="345" width="120" height="26" rx="13" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="340" y="362" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="11">read</text>

  <rect x="440" y="345" width="120" height="26" rx="13" fill="#0d1117" stroke="#d2a8ff" stroke-width="1"/>
  <text x="500" y="362" text-anchor="middle" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="11">search_facts</text>

  <!-- Arrow: SQLite -> MCP -->
  <line x1="400" y1="290" x2="400" y2="308" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>